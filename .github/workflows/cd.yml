  #     - name: Set kubeconfig
  #       run: echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > /tmp/kube.yaml
  #
  #     - name: Roll out new image
  #       env:
  #         KUBECONFIG: /tmp/kube.yaml
  #         IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
  #       run: |
  #         kubectl set image deployment/payment-service \
  #           payment-service=${{ env.REGISTRY }}/${{ github.repository }}/payment-service:sha-$IMAGE_TAG
  #         kubectl set image deployment/outbox-relay \
  #           outbox-relay=${{ env.REGISTRY }}/${{ github.repository }}/outbox-relay:sha-$IMAGE_TAG
  #         kubectl set image deployment/consumer-stubs \
  #           consumer-stubs=${{ env.REGISTRY }}/${{ github.repository }}/consumer-stubs:sha-$IMAGE_TAG
