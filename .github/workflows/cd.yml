  #
  #     - name: Set kubeconfig
  #       run: echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > /tmp/kube.yaml
  #
  #     - name: Roll out new image
  #       env:
  #         KUBECONFIG: /tmp/kube.yaml
  #         IMAGE_TAG: sha-${{ github.sha }}
  #       run: |
  #         kubectl set image deployment/payment-service \
  #           payment-service=${{ env.REGISTRY }}/${{ github.repository }}/payment-service:$IMAGE_TAG
  #         kubectl set image deployment/outbox-relay \
  #           outbox-relay=${{ env.REGISTRY }}/${{ github.repository }}/outbox-relay:$IMAGE_TAG
  #         kubectl set image deployment/consumer-stubs \
  #           consumer-stubs=${{ env.REGISTRY }}/${{ github.repository }}/consumer-stubs:$IMAGE_TAG
