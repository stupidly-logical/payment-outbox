name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payments
          POSTGRES_USER: payments
          POSTGRES_PASSWORD: payments
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build (all modules, skip tests)
        run: mvn clean install -DskipTests -B

      - name: Run tests
        run: mvn verify -B
        env:
          # Testcontainers can use the service above, or spin its own —
          # either way Docker is available on ubuntu-latest runners
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/payments
          SPRING_DATASOURCE_USERNAME: payments
          SPRING_DATASOURCE_PASSWORD: payments

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7
