spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: payments
    password: payments
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_payments    # explicit name for payment-service

  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.paymentpipeline: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{ISO8601} %-5level [%thread] %logger{36} - %msg%n"

server:
  port: 8080