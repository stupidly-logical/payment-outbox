spring:
  application:
    name: consumer-stubs

  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: payments
    password: payments
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_consumers   # separate history table from payment-service
    baseline-on-migrate: true    # allows migration into a non-empty schema
    baseline-version: 0          # baseline at version 0 so V1 still runs

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-consumers   # default — overridden per listener
      auto-offset-reset: earliest
      enable-auto-commit: false      # manual offset commit via Spring Kafka
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: http://localhost:8081
        specific.avro.reader: true   # deserialize into generated PaymentEvent class

  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    enable:
      kafka: true
  endpoint:
    metrics:
      enabled: true

logging:
  level:
    com.paymentpipeline: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{ISO8601} %-5level [%thread] %logger{36} - %msg%n"


server:
  port: 8083